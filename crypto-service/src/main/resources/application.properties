# ══════════════════════════════════════════════════════════════
#  CONFIGURACIÓN – Crypto Service
#  Quarkus 3.9 · Puerto 8081
# ══════════════════════════════════════════════════════════════

# Puerto del servicio (cada microservicio usa un puerto diferente)
quarkus.http.port=8081

# Nombre del servicio (aparece en health checks y trazas)
quarkus.application.name=crypto-service
quarkus.application.version=1.0.0

# ── Logging ──────────────────────────────────────────────────
# BUENA PRÁCTICA: Nivel INFO en producción, DEBUG solo en desarrollo.
# Nunca poner DEBUG en producción (puede exponer datos sensibles).
quarkus.log.level=INFO
quarkus.log.category."com.bcp.dac".level=DEBUG

# Formato de log con timestamp, nivel y clase
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{3.}] (%t) %s%e%n

# ── OpenAPI / Swagger UI ──────────────────────────────────────
quarkus.smallrye-openapi.path=/api/v1/openapi
mp.openapi.extensions.smallrye.info.title=Crypto Service API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Servicio de cifrado educativo: RSA-2048 + AES-256-GCM
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ── CORS (para pruebas desde el navegador) ───────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# ── Health Check ─────────────────────────────────────────────
quarkus.smallrye-health.root-path=/health
