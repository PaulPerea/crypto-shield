# ══════════════════════════════════════════════════════════════
#  CONFIGURACIÓN – Account Service
#  Quarkus 3.9 · Puerto 8082
# ══════════════════════════════════════════════════════════════

quarkus.http.port=8082
quarkus.application.name=account-service
quarkus.application.version=1.0.0

# ── REST Client: URL del Crypto Service ──────────────────────
# configKey="crypto-service" debe coincidir con @RegisterRestClient(configKey="crypto-service")
quarkus.rest-client.crypto-service.url=http://localhost:8081

# Timeout del cliente REST (en milisegundos)
quarkus.rest-client.crypto-service.connect-timeout=5000
quarkus.rest-client.crypto-service.read-timeout=10000

# ── Logging ──────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.bcp.dac".level=DEBUG
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{3.}] (%t) %s%e%n

# ── OpenAPI / Swagger UI ──────────────────────────────────────
quarkus.smallrye-openapi.path=/api/v1/openapi
mp.openapi.extensions.smallrye.info.title=Account Service API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Gestión de cuentas bancarias con datos cifrados
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ── CORS ─────────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

# ── Health Check ─────────────────────────────────────────────
quarkus.smallrye-health.root-path=/health
